{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ title }}</h1>

{% for post in posts %}
<div class="post-card">
    <h2><a href="/post/{{ post.id }}">{{ post.title | title }}</a></h2>
    <p>{{ post.body[:100] }}...</p>
</div>
{% endfor %}

{% endblock %}
